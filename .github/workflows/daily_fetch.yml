name: Daily GenAI Radar Fetch

on:
  schedule:
    - cron: "0 6 * * *"   # 07:00 CET / 06:00 UTC every day
  workflow_dispatch:        # manual trigger from GitHub UI or API

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # required to commit and push digest.json

    env:
      # Non-sensitive config hardcoded directly — only the API key comes from Secrets
      AZURE_OPENAI_ENDPOINT:    "https://aura-agent-test.openai.azure.com/"
      AZURE_OPENAI_DEPLOYMENT:  "gpt-4"
      AZURE_OPENAI_API_VERSION: "2024-02-01"
      AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate config
        run: |
          echo "ENDPOINT    : $AZURE_OPENAI_ENDPOINT"
          echo "DEPLOYMENT  : $AZURE_OPENAI_DEPLOYMENT"
          echo "API_VERSION : $AZURE_OPENAI_API_VERSION"
          echo "API_KEY len : ${#AZURE_OPENAI_API_KEY}"
          if [ -z "$AZURE_OPENAI_API_KEY" ]; then
            echo "ERROR: AZURE_OPENAI_API_KEY secret is empty — add it in GitHub repo Settings → Secrets → Actions"
            exit 1
          fi
          echo "Config OK."

      - name: Run fetch.py
        run: python fetch.py

      - name: Commit and push digest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digest.json
          git commit -m "digest: $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git pull --rebase origin main
          git push
